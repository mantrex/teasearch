# Configurazione per teasearch_filter
# Supporta content type di nodi e ricerca negli utenti
content_types:
  # Content type normali (nodi)
  texts:
    machine_name: primary_sources
    type: node
    label: 'Texts'
    results:
      function: format_texts_display
      content_threshold: 10
      image: field_square_thumbnail
      altimage: field_main_image
    filters:
      subjects:
        type: taxonomy
        vocabulary: subjects
        label: 'Subjects'
      century_selector:
        from: field_year_range.year_from
        to: field_year_range.year_to
        display: auto
  essentials:
    machine_name: first_reference
    type: node
    label: 'Essentials'
    results:
      mainfield: title
      subfield: field_short_description
      image: field_square_thumbnail
    filters:
      keywords:
        type: free_text
        label: 'Keywords'
  video:
    machine_name: videos
    type: node
    label: 'Videos'
    results:
      function: format_videos_display
      image: field_square_thumbnail
      altimage: field_main_image
    filters:
      categories:
        type: taxonomy
        vocabulary: video_categories
        label: 'Video categories'
      keywords:
        type: free_text
        label: 'Keywords'
  images:
    machine_name: images
    type: node
    label: 'Images'
    results:
      function: format_images_display
      image: field_square_thumbnail
      altimage: field_main_image
    filters:
      categories:
        type: taxonomy
        vocabulary: image_categories
        label: 'Image categories'
      keywords:
        type: free_text
        label: 'Keywords'
      century_selector:
        from: field_year_range.year_from
        to: field_year_range.year_to
        display: auto
  
  # Esempio con condizione WHERE per filtrare nodi specifici
  people:
    machine_name: people
    type: node
    label: 'People'
    #where: '[{"field_roles.target_id":"contributors"}]'
    results:
      function: format_people_display
      image: field_avatar
    filters:
      skills:
        type: taxonomy
        vocabulary: skills
        label: 'Skills'
      location:
        type: taxonomy
        vocabulary: location
        label: 'Location'
      keywords:
        type: free_text
        label: 'Keywords'
  bibliography:
    machine_name: bibliography
    results:
      function: format_bibliography_display
      image: icons

    filters:
      subjects:
        type: taxonomy
        vocabulary: subjects
        label: 'Subjects'

  # Esempio per cercare direttamente negli utenti
