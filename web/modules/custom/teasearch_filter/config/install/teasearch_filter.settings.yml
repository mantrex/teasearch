# Configurazione per teasearch_filter
# Supporta content type di nodi e ricerca negli utenti
content_types:
  # Content type normali (nodi)
  texts:
    machine_name: primary_sources
    type: node
    label: 'Texts'
    results:
      function: format_texts_display
      content_threshold: 10
      image: field_square_thumbnail
      altimage: field_main_image
    filters:
      subjects:
        type: taxonomy
        vocabulary: subjects
        label: 'Subjects'
      country2:
        type: taxonomy
        vocabulary: countries
        label: 'Geographical focus'
      text_genres:
        type: taxonomy
        vocabulary: text_genres
        label: 'Genres'
      language:
        type: taxonomy
        vocabulary: languages
        label: 'Languages'
      country:
        type: taxonomy
        vocabulary: countries
        label: 'Country'
      text_types:
        type: taxonomy
        vocabulary: text_types
        label: 'Text Types'
      century_selector:
        from: field_year_range.year_from
        to: field_year_range.year_to
        display: auto
  essentials:
    machine_name: first_reference
    type: node
    label: 'Essentials'
    results:
      mainfield: title
      subfield: field_short_description
      image: field_square_thumbnail
    filters:
      subjects:
        type: taxonomy
        vocabulary: subjects
        label: 'Subjects'
      country2:
        type: taxonomy
        vocabulary: countries
        label: 'Geographical focus'
  video:
    machine_name: videos
    type: node
    label: 'Videos'
    results:
      function: format_videos_display
      image: field_square_thumbnail
      altimage: field_main_image
    filters:
      subjects:
        type: taxonomy
        vocabulary: subjects
        label: 'Subjects'
      country2:
        type: taxonomy
        vocabulary: countries
        label: 'Geographical focus'
      text_genres:
        type: taxonomy
        vocabulary: video_genres
        label: 'Video categories'
      language:
        type: taxonomy
        vocabulary: languages
        label: 'Languages'
      year:
        type: free_text
        label: 'Year'

  images:
    machine_name: images
    type: node
    label: 'Images'
    results:
      function: format_images_display
      image: field_square_thumbnail
      altimage: field_main_image
    filters:
      subjects:
        type: taxonomy
        vocabulary: subjects
        label: 'Subjects'
      country2:
        type: taxonomy
        vocabulary: countries
        label: 'Geographical focus'
      image_category:
        type: taxonomy
        vocabulary: image_formats
        label: 'Image categories'
      country:
        type: taxonomy
        vocabulary: countries
        label: 'Country'
      usage_rights:
        type: taxonomy
        vocabulary: usage_rights
        label: 'Usage Rights'
      century_selector:
        from: field_year_range.year_from
        to: field_year_range.year_to
        display: auto
  
  # Esempio con condizione WHERE per filtrare nodi specifici
  people:
    machine_name: people
    type: node
    label: 'People'
    #where: '[{"field_roles.target_id":"contributors"}]'
    results:
      function: format_people_display
      image: field_avatar
    filters:
      subjects:
        type: taxonomy
        vocabulary: subjects
        label: 'Subjects'
      country2:
        type: taxonomy
        vocabulary: countries
        label: 'Geographical focus'
      activities:
        type: taxonomy
        vocabulary: activities
        label: 'Tea Related Activities'
      language:
        type: taxonomy
        vocabulary: languages
        label: 'Languages'
      country:
        type: taxonomy
        vocabulary: countries
        label: 'Country'

  bibliography:
    machine_name: bibliography
    results:
      function: format_bibliography_display
      image: icons

    filters:
      subjects:
        type: taxonomy
        vocabulary: subjects
        label: 'Subjects'
      country2:
        type: taxonomy
        vocabulary: countries
        label: 'Geographical focus'
      pubtype:
        type: taxonomy
        vocabulary: publication_types
        label: 'Publication Types'
      language:
        type: taxonomy
        vocabulary: languages
        label: 'Languages'
      year:
        type: free_text
        label: 'Year'

  # Esempio per cercare direttamente negli utenti
#  users:
#   machine_name: user
#    type: user
#    label: 'Site Users'
#    results:
#      mainfield: name
#      subfield: field_biography
