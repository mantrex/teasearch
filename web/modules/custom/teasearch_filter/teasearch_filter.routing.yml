teasearch_filter.search:
  path: '/category/{content_type}'
  defaults:
    _controller: '\Drupal\teasearch_filter\Controller\SearchController::search'
    _title_callback: '\Drupal\teasearch_filter\Controller\SearchController::title'
  requirements:
    _permission: 'access content'
    content_type: '[a-z0-9_]+'

teasearch_filter.free_search_results:
  path: '/search'
  defaults:
    _controller: '\Drupal\teasearch_filter\Controller\SearchController::freeSearchResults'
    _title: 'Search Results'
  requirements:
    _permission: 'access content'


